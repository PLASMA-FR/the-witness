[gemma]
backend = "ollama"
model = "gemma4:e2b"
url = "http://localhost:11434"
setup_completed = false

[setup]
last_doctor_check = ""
judge_schema_test_passed = false
proxy_test_passed = false
model_test_passed = false
demo_mode = false

[defaults]
retry_limit = 3
strictness = "medium"
fallback_mode = "human_review"
log_format = "jsonl"
privacy_mode = false

[profiles.coding]
preferred_backend = "ollama"
preferred_model = "gemma4:e4b"
fallback_model = "gemma4:e2b"
strictness = "high"
fallback_mode = "human_review"

[profiles.education]
preferred_backend = "ollama"
preferred_model = "gemma4:e2b"
fallback_model = "gemma4:e2b"
strictness = "medium"
fallback_mode = "safe_response"

[profiles.high_risk]
preferred_backend = "ollama"
preferred_model = "gemma4:e4b"
fallback_model = "gemma4:e2b"
strictness = "critical"
fallback_mode = "human_review"

[[endpoints]]
name = "Blackbox Grok Code"
enabled = true
upstream_url = "https://api.blackbox.ai/v1"
local_proxy_url = "http://localhost:8787/v1"
model = "blackboxai/x-ai/grok-code-fast-1:free"
profile = "coding"
retry_limit = 4
strictness = "high"
fallback_mode = "human_review"
timeout_seconds = 60

[endpoints.auth]
type = "bearer_env"
env = "BLACKBOX_API_KEY"
